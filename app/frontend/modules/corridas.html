<div class="space-y-8 max-w-5xl">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold mb-6 text-indigo-600 flex items-center gap-2">
            <i data-lucide="zap"></i> Registro de Corridas
        </h2>
        <form id="formCorrida" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Nombre Corrida (*)</label>
                    <input type="text" name="nombre_corrida" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Fecha Corrida (*)</label>
                    <input type="date" name="fecha_corrida" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Equipo (*)</label>
                    <select name="equipo_corrida" id="equipo_corrida" onchange="toggleTechFields('formCorrida')" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        <option value="MISEQ_3346">MiSeq-3346</option>
                        <option value="MISEQ_6899">MiSeq-6899</option>
                        <option value="MISEQ_7735">MiSeq-7735</option>
                        <option value="NOVASEQ-A01357_A">NovaSeq-A01357_lado-A</option>
                        <option value="NOVASEQ-A01357_B">NovaSeq-A01357_lado-B</option>
                        <option value="MIN_MK1C_113813">MimION-Mk1C-113813</option>
                        <option value="MIN_MK1C_113817">MinION-Mk1C-113817</option>
                        <option value="MIN_MK1C_114452">MinION-Mk1C-114452</option>
                        <option value="MIN_MK1C_114456">MinION-Mk1C-114456</option>
                        <option value="GRIDION_05337">GridION-05337</option>
                        <option value="PROMETHION">PromethION</option>
                        <option value="OTRO">Otro</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Plataforma (*)</label>
                    <select name="id_tecnologia_plataforma" id="id_tecnologia_plataforma" required onchange="toggleTechFields('formCorrida')" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        <option value="illumina">Illumina</option>
                        <option value="nanopore">Nanopore</option>
                    </select>
                </div>
            </div>

            <div id="formCorrida-fields-illumina" class="hidden p-4 bg-blue-50 rounded-lg grid grid-cols-1 md:grid-cols-3 gap-4 border border-blue-200">
                <h3 class="md:col-span-3 font-bold text-blue-800 text-xs tracking-wide">Parámetros Illumina</h3>
                <div><label class="block text-sm font-medium text-slate-700">Ciclos (*)</label><input type="number" name="cantidad_ciclos" data-required="true" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">Mail BaseSpace (*)</label><input type="email" name="mail_basespace" data-required="true" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Tipo Cartucho / Flowcell (*)</label>
                    <select id="tipo_cartucho_illumina" name="tipo_cartucho" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></select>
                </div>
                <div><label class="block text-sm font-medium text-slate-700">% Passing Filter</label><input type="number" name="passing_filter" step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">Clustering</label><input type="number" name="clustering" step="0.1" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">% Q30</label><input type="number" name="q30" step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
            </div>

            <div id="formCorrida-fields-nanopore" class="hidden p-4 bg-orange-50 rounded-lg grid grid-cols-1 md:grid-cols-3 gap-4 border border-orange-200">
                <h3 class="md:col-span-3 font-bold text-orange-800 text-xs tracking-wide">Parámetros Nanopore</h3>
                <div><label class="block text-sm font-medium text-slate-700">Modo Basecalling (*)</label>
                    <select name="modo_basecalling" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm">
                        <option value="FAS">Fast (FAS)</option>
                        <option value="HAC">High Accuracy (HAC)</option>
                        <option value="SUP">Super-Accurate (SUP)</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium text-slate-700">Poros Iniciales (*)</label><input type="number" name="cantidad_inicial_poros" data-required="true" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Tipo Flowcell (*)</label>
                    <select id="tipo_cartucho_nanopore" name="tipo_cartucho" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></select>
                </div>
                <div class="md:col-span-3"><label class="block text-sm font-medium text-slate-700">Tiempo Final</label><input type="text" name="tiempo_final_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-slate-700">Yield Data</label><input type="text" name="yield_data" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700">Comentario Corrida</label><input type="text" name="comentario_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
            </div>

            <button type="submit" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-indigo-700 transition">Guardar Corrida</button>
        </form>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">
        <h2 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
            <i data-lucide="layers"></i> Modificación de Corridas Existentes
        </h2>
        
        <div class="max-w-2xl">
            <label for="select_corrida_editar" class="block text-sm font-medium text-slate-700">Seleccione la corrida que desea modificar:</label>
            <select id="select_corrida_editar" onchange="cargarCorridaParaModificar()" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                <option value="">Cargando corridas registradas...</option>
            </select>
        </div>

        <div id="wrapper_edicion_corrida" class="hidden space-y-6 pt-4 border-t border-slate-100 relative animate-fadeIn">
            <input type="hidden" id="edit_id_corrida">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-slate-700">Nombre Corrida (*)</label><input type="text" id="edit_nombre_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700">Fecha Corrida (*)</label><input type="date" id="edit_fecha_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-slate-700">Equipo (*)</label>
                    <select id="edit_equipo_corrida" onchange="toggleTechFields('wrapper_edicion_corrida')" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        <option value="MISEQ_3346">MiSeq-3346</option>
                        <option value="MISEQ_6899">MiSeq-6899</option>
                        <option value="MISEQ_7735">MiSeq-7735</option>
                        <option value="NOVASEQ-A01357_A">NovaSeq-A01357_lado-A</option>
                        <option value="NOVASEQ-A01357_B">NovaSeq-A01357_lado-B</option>
                        <option value="MIN_MK1C_113813">MimION-Mk1C-113813</option>
                        <option value="MIN_MK1C_113817">MinION-Mk1C-113817</option>
                        <option value="MIN_MK1C_114452">MinION-Mk1C-114452</option>
                        <option value="MIN_MK1C_114456">MinION-Mk1C-114456</option>
                        <option value="GRIDION_05337">GridION-05337</option>
                        <option value="PROMETHION">PromethION</option>
                        <option value="OTRO">Otro</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium text-slate-700">Plataforma (*)</label>
                    <select id="edit_id_tecnologia_plataforma" onchange="toggleTechFields('wrapper_edicion_corrida')" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                        <option value="illumina">Illumina</option>
                        <option value="nanopore">Nanopore</option>
                    </select>
                </div>
            </div>

            <div id="wrapper_edicion_corrida-fields-illumina" class="hidden p-4 bg-blue-50 rounded-lg grid grid-cols-1 md:grid-cols-3 gap-4 border border-blue-200">
                <h3 class="md:col-span-3 font-bold text-blue-800 text-xs">Parámetros Illumina</h3>
                <div><label class="block text-sm font-medium text-slate-700">Ciclos (*)</label><input type="number" id="edit_cantidad_ciclos" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">Mail BaseSpace (*)</label><input type="email" id="edit_mail_basespace" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Tipo Cartucho / Flowcell (*)</label>
                    <select id="edit_tipo_cartucho_illumina" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></select>
                </div>
                <div><label class="block text-sm font-medium text-slate-700">% Passing Filter</label><input type="number" id="edit_passing_filter" step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">Clustering</label><input type="number" id="edit_clustering" step="0.1" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700">% Q30</label><input type="number" id="edit_q30" step="0.01" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
            </div>

            <div id="wrapper_edicion_corrida-fields-nanopore" class="hidden p-4 bg-orange-50 rounded-lg grid grid-cols-1 md:grid-cols-3 gap-4 border border-orange-200">
                <h3 class="md:col-span-3 font-bold text-orange-800 text-xs">Parámetros Nanopore</h3>
                <div><label class="block text-sm font-medium text-slate-700">Modo Basecalling (*)</label>
                    <select id="edit_modo_basecalling" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm">
                        <option value="FAS">Fast (FAS)</option>
                        <option value="HAC">High Accuracy (HAC)</option>
                        <option value="SUP">Super-Accurate (SUP)</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium text-slate-700">Poros Iniciales (*)</label><input type="number" id="edit_cantidad_inicial_poros" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Tipo Flowcell (*)</label>
                    <select id="edit_tipo_cartucho_nanopore" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></select>
                </div>
                <div class="md:col-span-3"><label class="block text-sm font-medium text-slate-700">Tiempo Final</label><input type="text" id="edit_tiempo_final_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-slate-700">Yield Data</label><input type="text" id="edit_yield_data" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
                <div><label class="block text-sm font-medium text-slate-700">Comentario Corrida</label><input type="text" id="edit_comentario_corrida" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></div>
            </div>

            <div class="flex justify-start gap-3">
                <button type="button" onclick="enviarModificacionCorrida()" class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-indigo-700 transition flex items-center gap-2">
                    Actualizar Corrida
                </button>
                <button type="button" onclick="cancelarEdicionCorrida()" class="bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg hover:bg-slate-300 transition">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const OP_CARTUCHOS_ILLUMINA = ["2x150", "2x250", "2x300"];
    const OP_CARTUCHOS_NANOPORE = ["FLO-MIN114_r10", "FLO-MIN004RA_r10", "FLO-PRO114M", "FLO-PRO004RA"];

    if (typeof window.corridasDataStore === 'undefined') {
        window.corridasDataStore = { listaCorridas: [] };
    }

    function init_corridas() {
        if (window.lucide) lucide.createIcons();
        
        // 1. PRIMERO POBLAMOS LAS OPCIONES EN EL DOM
        poblarSelectoresCartucho('formCorrida');
        poblarSelectoresCartucho('wrapper_edicion_corrida');
        
        // 2. LUEGO ACTUALIZAMOS LA VISIBILIDAD Y LOS ESTADOS DISABLED
        toggleTechFields('formCorrida');
        toggleTechFields('wrapper_edicion_corrida');
        
        if (window.setupSimpleSubmit) {
            window.setupSimpleSubmit('formCorrida', '/corridas/', 'Guardar Corrida');
        }
        
        actualizarSelectorCorridas();
    }

    function poblarSelectoresCartucho(containerId) {
        const esEdicion = containerId === 'wrapper_edicion_corrida';
        const selectIllu = document.getElementById(esEdicion ? 'edit_tipo_cartucho_illumina' : 'tipo_cartucho_illumina');
        const selectNano = document.getElementById(esEdicion ? 'edit_tipo_cartucho_nanopore' : 'tipo_cartucho_nanopore');
        
        // Modificado para forzar que el primer elemento sea explícitamente "selected" desde el render
        if(selectIllu) {
            selectIllu.innerHTML = OP_CARTUCHOS_ILLUMINA.map((c, i) => `<option value="${c}" ${i===0?'selected':''}>${c}</option>`).join('');
        }
        if(selectNano) {
            selectNano.innerHTML = OP_CARTUCHOS_NANOPORE.map((c, i) => `<option value="${c}" ${i===0?'selected':''}>${c}</option>`).join('');
        }
    }

    function toggleTechFields(containerId) {
        const esEdicion = containerId === 'wrapper_edicion_corrida';
        const equipoSelect = document.getElementById(esEdicion ? 'edit_equipo_corrida' : 'equipo_corrida');
        const plataformaSelect = document.getElementById(esEdicion ? 'edit_id_tecnologia_plataforma' : 'id_tecnologia_plataforma');
        
        if (!equipoSelect || !plataformaSelect) return;
        const eq = equipoSelect.value;
        
        if (eq.includes('MISEQ') || eq.includes('NOVA')) {
            plataformaSelect.value = "illumina";
        } else if (eq.includes('MIN') || eq.includes('GRIDION') || eq.includes('PROMETHION')) {
            plataformaSelect.value = "nanopore";
        }

        const esIllumina = plataformaSelect.value === "illumina";
        const esNanopore = plataformaSelect.value === "nanopore";

        const panelIllumina = document.getElementById(`${containerId}-fields-illumina`);
        const panelNanopore = document.getElementById(`${containerId}-fields-nanopore`);

        if (panelIllumina && panelNanopore) {
            panelIllumina.classList.toggle('hidden', !esIllumina);
            panelNanopore.classList.toggle('hidden', !esNanopore);

            panelIllumina.querySelectorAll('input, select').forEach(el => {
                el.disabled = !esIllumina;
                // Si se activa Illumina, nos aseguramos de que el select de cartucho tenga su primer valor por defecto
                if (esIllumina && el.id === 'tipo_cartucho_illumina' && !el.value) {
                    el.value = OP_CARTUCHOS_ILLUMINA[0];
                }
                if (el.hasAttribute('data-required') || el.id === 'edit_cantidad_ciclos' || el.id === 'edit_mail_basespace') {
                    el.required = esIllumina;
                }
            });
            
            panelNanopore.querySelectorAll('input, select').forEach(el => {
                el.disabled = !esNanopore;
                // Si se activa Nanopore, nos aseguramos de que el select de cartucho tenga su primer valor por defecto
                if (esNanopore && el.id === 'tipo_cartucho_nanopore' && !el.value) {
                    el.value = OP_CARTUCHOS_NANOPORE[0];
                }
                if (el.hasAttribute('data-required') || el.id === 'edit_cantidad_inicial_poros') {
                    el.required = esNanopore;
                }
            });
        }
    }

    async function actualizarSelectorCorridas() {
        const select = document.getElementById("select_corrida_editar");
        if (!select) return;
        select.innerHTML = '<option value="">Seleccione una corrida para editar...</option>';
        
        const urlBase = typeof API_URL !== 'undefined' ? API_URL : 'http://127.0.0.1:8000';

        try {
            const res = await fetch(`${urlBase}/corridas/`);
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            
            const data = await res.json();
            window.corridasDataStore.listaCorridas = Array.isArray(data) ? data : [];
            
            window.corridasDataStore.listaCorridas.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id_corrida; 
                const platFormateada = c.id_tecnologia_plataforma ? c.id_tecnologia_plataforma.toUpperCase() : 'S/D';
                opt.textContent = `ID: ${c.id_corrida} | Corrida: ${c.nombre_corrida} | Fecha: ${c.fecha_corrida} | [${platFormateada}]`;
                select.appendChild(opt);
            });
        } catch (err) {
            select.innerHTML = '<option value="">Error al cargar las corridas activas</option>';
            console.error("Error cargando selector de corridas:", err);
        }
    }

    function cargarCorridaParaModificar() {
        const idSeleccionado = document.getElementById("select_corrida_editar").value;
        const wrapper = document.getElementById("wrapper_edicion_corrida");
        
        if (!idSeleccionado) {
            if (wrapper) wrapper.classList.add("hidden");
            return;
        }
        
        const corrida = window.corridasDataStore.listaCorridas.find(c => c.id_corrida == idSeleccionado);
        if (!corrida) return;

        try {
            document.getElementById("edit_id_corrida").value = corrida.id_corrida;
            document.getElementById("edit_nombre_corrida").value = corrida.nombre_corrida || "";
            document.getElementById("edit_fecha_corrida").value = corrida.fecha_corrida || "";
            document.getElementById("edit_equipo_corrida").value = corrida.equipo_corrida || "OTRO";
            document.getElementById("edit_id_tecnologia_plataforma").value = corrida.id_tecnologia_plataforma || "illumina";
            document.getElementById("edit_yield_data").value = corrida.yield_data || "";
            document.getElementById("edit_comentario_corrida").value = corrida.comentario_corrida || "";

            toggleTechFields('wrapper_edicion_corrida');

            if (corrida.id_tecnologia_plataforma === "illumina") {
                document.getElementById("edit_tipo_cartucho_illumina").value = corrida.tipo_cartucho || "2x150";
            } else if (corrida.id_tecnologia_plataforma === "nanopore") {
                document.getElementById("edit_tipo_cartucho_nanopore").value = corrida.tipo_cartucho || "FLO-MIN114_r10";
            }

            const illuData = corrida.illumina || {};
            document.getElementById("edit_cantidad_ciclos").value = illuData.cantidad_ciclos !== undefined ? illuData.cantidad_ciclos : "";
            document.getElementById("edit_mail_basespace").value = illuData.mail_basespace || "";
            document.getElementById("edit_passing_filter").value = illuData.passing_filter !== undefined ? illuData.passing_filter : "";
            document.getElementById("edit_clustering").value = illuData.clustering !== undefined ? illuData.clustering : "";
            document.getElementById("edit_q30").value = illuData.q30 !== undefined ? illuData.q30 : "";

            const nanoData = corrida.nanopore || {};
            document.getElementById("edit_modo_basecalling").value = nanoData.modo_basecalling || "FAS";
            document.getElementById("edit_cantidad_inicial_poros").value = nanoData.cantidad_inicial_poros !== undefined ? nanoData.cantidad_inicial_poros : "";
            document.getElementById("edit_tiempo_final_corrida").value = nanoData.tiempo_final_corrida || "";

            if (wrapper) wrapper.classList.remove("hidden");

        } catch(err) {
            console.error("Error inyectando datos anidados en la vista:", err);
        }
    }

    function cancelarEdicionCorrida() {
        const select = document.getElementById("select_corrida_editar");
        if (select) select.value = "";
        const wrapper = document.getElementById("wrapper_edicion_corrida");
        if (wrapper) wrapper.classList.add("hidden");
    }

    async function enviarModificacionCorrida() {
        const idCorrida = document.getElementById("edit_id_corrida").value;
        if (!idCorrida) return;

        const urlBase = typeof API_URL !== 'undefined' ? API_URL : 'http://127.0.0.1:8000';
        const plataforma = document.getElementById("edit_id_tecnologia_plataforma").value;
        
        const cartuchoValor = (plataforma === "illumina") 
            ? document.getElementById("edit_tipo_cartucho_illumina").value 
            : document.getElementById("edit_tipo_cartucho_nanopore").value;

        const payload = {
            nombre_corrida: document.getElementById("edit_nombre_corrida").value,
            fecha_corrida: document.getElementById("edit_fecha_corrida").value,
            id_tecnologia_plataforma: plataforma,
            equipo_corrida: document.getElementById("edit_equipo_corrida").value,
            tipo_cartucho: cartuchoValor,
            yield_data: document.getElementById("edit_yield_data").value.trim(),
            comentario_corrida: document.getElementById("edit_comentario_corrida").value.trim()
        };

        if (plataforma === "illumina") {
            payload.cantidad_ciclos = parseInt(document.getElementById("edit_cantidad_ciclos").value) || null;
            payload.mail_basespace = document.getElementById("edit_mail_basespace").value;
            payload.passing_filter = parseFloat(document.getElementById("edit_passing_filter").value) || null;
            payload.clustering = parseFloat(document.getElementById("edit_clustering").value) || null;
            payload.q30 = parseFloat(document.getElementById("edit_q30").value) || null;
        } else {
            payload.modo_basecalling = document.getElementById("edit_modo_basecalling").value;
            payload.cantidad_inicial_poros = parseInt(document.getElementById("edit_cantidad_inicial_poros").value) || null;
            payload.tiempo_final_corrida = document.getElementById("edit_tiempo_final_corrida").value.trim();
        }

        try {
            const res = await fetch(`${urlBase}/corridas/${idCorrida}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.detail || "Fallo en la respuesta de validación del servidor.");
            }

            alert("¡Corrida de secuenciación modificada de forma exitosa!");
            cancelarEdicionCorrida();
            await actualizarSelectorCorridas();
        } catch (err) {
            console.error("Error en PATCH corridas:", err);
            alert(`No se pudo actualizar: ${err.message}`);
        }
    }
</script>
