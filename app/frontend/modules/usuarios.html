<div class="space-y-8 max-w-4xl">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold mb-6 text-blue-600 flex items-center gap-2">
            <i data-lucide="user-plus"></i> Registro de Usuarios
        </h2>
        <form id="formUsuario" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Instituto / Organización (*)</label>
                <input type="text" name="instituto" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Abreviación (*)</label>
                <input type="text" name="abreviacion" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Nombre (*)</label>
                <input type="text" name="nombre" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Apellido (*)</label>
                <input type="text" name="apellido" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Email Institucional (*)</label>
                <input type="email" name="mail" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Origen Geográfico</label>
                <input type="text" name="origen_geografico" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <button type="submit" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    Guardar Usuario
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">
        <h2 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
            <i data-lucide="user-check"></i> Modificación de Usuarios Existentes
        </h2>
        
        <div class="max-w-md">
            <label for="select_usuario_editar" class="block text-sm font-medium text-slate-700">Seleccione el usuario que desea modificar:</label>
            <select id="select_usuario_editar" onchange="cargarUsuarioParaModificar()" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                <option value="">Cargando usuarios disponibles...</option>
            </select>
        </div>

        <div id="wrapper_edicion_usuario" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100 relative animate-fadeIn">
            <input type="hidden" id="edit_id_usuario">
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Instituto / Organización (*)</label>
                <input type="text" id="edit_instituto" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Abreviación (*)</label>
                <input type="text" id="edit_abreviacion" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Nombre (*)</label>
                <input type="text" id="edit_nombre" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Apellido (*)</label>
                <input type="text" id="edit_apellido" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Email Institucional (*)</label>
                <input type="email" id="edit_mail" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Origen Geográfico</label>
                <input type="text" id="edit_origen_geografico" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            
            <div class="md:col-span-2 flex justify-start gap-3">
                <button type="button" onclick="enviarModificacionUsuario()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition">
                    Actualizar Usuario
                </button>
                <button type="button" onclick="cancelarEdicionUsuario()" class="bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg hover:bg-slate-300 transition">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let listaUsuariosLocal = [];

    async function init_usuarios() {
        setupSimpleSubmit('formUsuario', '/usuarios/', 'Guardar Usuario');
        await actualizarSelectorUsuarios();
    }

    async function actualizarSelectorUsuarios() {
        const select = document.getElementById("select_usuario_editar");
        select.innerHTML = '<option value="">Seleccione un usuario para editar...</option>';
        
        try {
            const res = await fetch(`${API_URL.replace(/\/$/, "")}/usuarios/`);
            if (!res.ok) throw new Error("Error al recuperar usuarios");
            
            listaUsuariosLocal = await res.json();
            
            listaUsuariosLocal.forEach(u => {
                const opt = document.createElement("option");
                opt.value = u.id_usuario;
                opt.textContent = `${u.apellido}, ${u.nombre} (${u.abreviacion}) - ${u.instituto}`;
                select.appendChild(opt);
            });
        } catch (err) {
            select.innerHTML = '<option value="">Error al cargar los usuarios</option>';
            console.error(err);
        }
    }

    function cargarUsuarioParaModificar() {
        const idSeleccionado = document.getElementById("select_usuario_editar").value;
        const wrapper = document.getElementById("wrapper_edicion_usuario");
        
        if (!idSeleccionado) {
            wrapper.classList.add("hidden");
            return;
        }
        
        const user = listaUsuariosLocal.find(u => u.id_usuario == idSeleccionado);
        if (!user) return;
        
        document.getElementById("edit_id_usuario").value = user.id_usuario;
        document.getElementById("edit_instituto").value = user.instituto || "";
        document.getElementById("edit_abreviacion").value = user.abreviacion || "";
        document.getElementById("edit_nombre").value = user.nombre || "";
        document.getElementById("edit_apellido").value = user.apellido || "";
        document.getElementById("edit_mail").value = user.mail || "";
        document.getElementById("edit_origen_geografico").value = user.origen_geografico || "";
        
        wrapper.classList.remove("hidden");
    }

    function cancelarEdicionUsuario() {
        document.getElementById("select_usuario_editar").value = "";
        document.getElementById("wrapper_edicion_usuario").classList.add("hidden");
    }

    async function enviarModificacionUsuario() {
        const idUsuario = document.getElementById("edit_id_usuario").value;
        if (!idUsuario) return;
        
        const payload = {
            instituto: document.getElementById("edit_instituto").value || null,
            abreviacion: document.getElementById("edit_abreviacion").value || null,
            nombre: document.getElementById("edit_nombre").value || null,
            apellido: document.getElementById("edit_apellido").value || null,
            mail: document.getElementById("edit_mail").value || null,
            origen_geografico: document.getElementById("edit_origen_geografico").value || null
        };
        
        try {
            // Construimos la URL limpia apuntando al nuevo endpoint del backend
            const endpointUrl = `${API_URL.replace(/\/$/, "")}/usuarios/${idUsuario}`;
            
            const res = await fetch(endpointUrl, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.detail || "Error en el procesamiento del backend.");
            }
            
            alert("¡Usuario modificado con éxito!");
            cancelarEdicionUsuario();
            await actualizarSelectorUsuarios();
            
        } catch (err) {
            alert(`No se pudo actualizar el registro: ${err.message}`);
        }
    }
</script>
