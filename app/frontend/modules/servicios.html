<div class="space-y-8 max-w-4xl">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold mb-6 text-emerald-600 flex items-center gap-2">
            <i data-lucide="layers-plus"></i> Registro de Servicios
        </h2>
        <form id="formServicio" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700">ID Usuario (*)</label>
                <select id="select-id-usuario-servicio" name="id_usuario" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">ID Convenio</label>
                <select id="select-id-convenio-servicio" name="id_convenio" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
                    <option value="">Seleccione...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Fecha Servicio (*)</label>
                <input type="date" name="fecha_servicio" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Cantidad de Muestras (*)</label>
                <input type="number" name="cantidad_muestras" required class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Objetivo</label>
                <select name="objetivo_servicio" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
                    <option value="vigilancia epidemiologica">Vigilancia epidemiológica</option>
                    <option value="brote">Vinculación a brote</option>
                    <option value="clinica">Clínica</option>
                    <option value="proyecto de investigacion">Proyecto de Investigación</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Detalle General del Servicio</label>
                <textarea name="detalle_servicio" rows="2" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></textarea>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Comentario Servicio</label>
                <textarea name="comentario_servicio" rows="2" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></textarea>
            </div>
            <div class="md:col-span-2">
                <button type="submit" class="bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-emerald-700 transition flex items-center gap-2">
                    Guardar Servicio
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">
        <h2 class="text-2xl font-bold text-emerald-600 flex items-center gap-2">
            <i data-lucide="layers"></i> Modificación de Servicios Existentes
        </h2>
        
        <div class="max-w-md">
            <label for="select_servicio_editar" class="block text-sm font-medium text-slate-700">Seleccione el servicio que desea modificar:</label>
            <select id="select_servicio_editar" onchange="cargarServicioParaModificar()" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
                <option value="">Cargando servicios disponibles...</option>
            </select>
        </div>

        <div id="wrapper_edicion_servicio" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100 relative animate-fadeIn">
            <input type="hidden" id="edit_id_servicio">
            
            <div>
                <label class="block text-sm font-medium text-slate-700">Usuario Asignado (*)</label>
                <select id="edit_id_usuario" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Convenio Asociado</label>
                <select id="edit_id_convenio" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
                    <option value="">Seleccione...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Fecha Servicio (*)</label>
                <input type="date" id="edit_fecha_servicio" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Cantidad de Muestras (*)</label>
                <input type="number" id="edit_cantidad_muestras" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Objetivo</label>
                <select id="edit_objetivo_servicio" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
                    <option value="vigilancia epidemiologica">Vigilancia epidemiológica</option>
                    <option value="brote">Vinculación a brote</option>
                    <option value="clinica">Clínica</option>
                    <option value="proyecto de investigacion">Proyecto de Investigación</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Detalle General del Servicio</label>
                <textarea id="edit_detalle_servicio" rows="2" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></textarea>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-slate-700">Comentario Servicio</label>
                <textarea id="edit_comentario_servicio" rows="2" class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"></textarea>
            </div>
            
            <div class="md:col-span-2 flex justify-start gap-3">
                <button type="button" onclick="enviarModificacionServicio()" class="bg-emerald-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-emerald-700 transition">
                    Actualizar Servicio
                </button>
                <button type="button" onclick="cancelarEdicionServicio()" class="bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg hover:bg-slate-300 transition">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let listaServiciosLocal = [];
    const base_url = typeof API_URL !== 'undefined' ? API_URL.replace(/\/$/, "") : 'http://127.0.0.1:8000';

    async function init_servicios() {
        if (window.lucide) lucide.createIcons();

        try {
            // 1. Poblamos selectores garantizando que terminen de cargar e inicializar las cachés antes de seguir
            await populateSelect('/usuarios/', 'select-id-usuario-servicio', 'id_usuario', null, window.formatUsuarioGlobal);
            await populateSelect('/convenios/', 'select-id-convenio-servicio', 'id_convenio', 'nombre_convenio');
            await populateSelect('/usuarios/', 'edit_id_usuario', 'id_usuario', null, window.formatUsuarioGlobal);
            await populateSelect('/convenios/', 'edit_id_convenio', 'id_convenio', 'nombre_convenio');

            // 2. Acoplamos el submit del formulario al helper global
            setupSimpleSubmit('formServicio', '/servicios/', 'Guardar Servicio');

            // 3. Ahora que los usuarios están 100% cargados en memoria, armamos el listado inferior
            await actualizarSelectorServicios();
            
        } catch (error) {
            console.error("Error durante la inicialización del módulo de servicios:", error);
        }
    }

    async function actualizarSelectorServicios() {
        const select = document.getElementById("select_servicio_editar");
        if (!select) return;
        select.innerHTML = '<option value="">Seleccione un servicio para editar...</option>';
        
        try {
            const res = await fetch(`${base_url}/servicios/`);
            if (!res.ok) throw new Error("Error al recuperar servicios");
            
            listaServiciosLocal = await res.json();
            
            listaServiciosLocal.forEach(s => {
                try {
                    const opt = document.createElement("option");
                    opt.value = s.id_servicio;
                    
                    // 1. Forzamos que el ID sea string para buscar en el objeto caché de manera segura
                    const idBusqueda = String(s.id_usuario);
                    const user = window.cacheUsuarios ? window.cacheUsuarios[idBusqueda] : null;
                    
                    let textoUser = `Usuario ID: ${s.id_usuario}`;
                    if (user && user.apellido) {
                        textoUser = `${user.apellido} (${user.abreviacion || ''})`;
                    }

                    // 2. Control defensivo por si el estado viene vacío o nulo
                    const estadoFormateado = s.estado_servicio ? String(s.estado_servicio).toUpperCase() : 'S/E';
                    const qMuestras = s.cantidad_muestras !== undefined && s.cantidad_muestras !== null ? s.cantidad_muestras : 0;
                    
                    // Formato exacto requerido
                    opt.textContent = `Servicio: ${s.id_servicio} - [${estadoFormateado}] | Muestras: ${qMuestras} | ${textoUser}`;
                    select.appendChild(opt);

                } catch (innerErr) {
                    // Si un servicio específico falla (ej. datos corruptos), no rompe toda la lista
                    console.error(`Error procesando de forma individual el servicio ID ${s.id_servicio}:`, innerErr);
                }
            });

            // Si se procesó todo pero quedó vacío el selector (salvo el default)
            if (select.children.length <= 1) {
                select.innerHTML = '<option value="">No se encontraron servicios cargados.</option>';
            }

        } catch (err) {
            select.innerHTML = '<option value="">Error al cargar los servicios</option>';
            console.error("Error poblando selector de servicios:", err);
        }
    }

    function cargarServicioParaModificar() {
        const idSeleccionado = document.getElementById("select_servicio_editar").value;
        const wrapper = document.getElementById("wrapper_edicion_servicio");
        
        if (!idSeleccionado) {
            wrapper.classList.add("hidden");
            return;
        }
        
        const serv = listaServiciosLocal.find(s => s.id_servicio == idSeleccionado);
        if (!serv) return;
        
        document.getElementById("edit_id_servicio").value = serv.id_servicio;
        document.getElementById("edit_id_usuario").value = serv.id_usuario || "";
        document.getElementById("edit_id_convenio").value = serv.id_convenio || "";
        document.getElementById("edit_fecha_servicio").value = serv.fecha_servicio || "";
        document.getElementById("edit_cantidad_muestras").value = serv.cantidad_muestras !== undefined ? serv.cantidad_muestras : "";
        document.getElementById("edit_objetivo_servicio").value = serv.objetivo_servicio || "";
        document.getElementById("edit_detalle_servicio").value = serv.detalle_servicio || "";
        document.getElementById("edit_comentario_servicio").value = serv.comentario_servicio || "";
        
        wrapper.classList.remove("hidden");
    }

    function cancelarEdicionServicio() {
        document.getElementById("select_servicio_editar").value = "";
        document.getElementById("wrapper_edicion_servicio").classList.add("hidden");
    }

    async function enviarModificacionServicio() {
        const idServicio = document.getElementById("edit_id_servicio")?.value;
        if (!idServicio) {
            alert("No se encontró el ID del servicio a editar.");
            return;
        }
        
        const payload = {};
        
        const campos = {
            id_usuario: { id: "edit_id_usuario", type: "int" },
            id_convenio: { id: "edit_id_convenio", type: "int", allowNull: true },
            fecha_servicio: { id: "edit_fecha_servicio", type: "string" },
            cantidad_muestras: { id: "edit_cantidad_muestras", type: "int" },
            objetivo_servicio: { id: "edit_objetivo_servicio", type: "string" },
            detalle_servicio: { id: "edit_detalle_servicio", type: "string", allowNull: true },
            comentario_servicio: { id: "edit_comentario_servicio", type: "string", allowNull: true }
        };

        for (const [key, config] of Object.entries(campos)) {
            const el = document.getElementById(config.id);
            if (!el) continue;
            
            const val = el.value.trim();
            if (val === "") {
                if (config.allowNull) payload[key] = null;
            } else {
                payload[key] = config.type === "int" ? parseInt(val, 10) : val;
            }
        }

        try {
            const res = await fetch(`${base_url}/servicios/${idServicio}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.detail || "Error en la modificación del servicio.");
            }
            
            alert("¡Servicio actualizado con éxito!");
            cancelarEdicionServicio();
            await actualizarSelectorServicios();
            
        } catch (err) {
            console.error("Error en PATCH:", err);
            alert(`No se pudo actualizar el registro: ${err.message}`);
        }
    }
</script>
