<div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
    <div class="flex justify-between items-center mb-6 min-w-max">
        <h2 class="text-2xl font-bold text-blue-600 flex items-center gap-2"><i data-lucide="user-cog"></i> Registro de Metadata Clínica</h2>
        <div class="flex gap-4 items-center">
            <label class="text-sm font-medium">ID Servicio</label>
            <select id="select-id-servicio-metadata" name="id_servicio" required class="border rounded p-1 text-sm" onchange="window.cargarMuestrasPorServicio(this.value)"></select>                        
            <button onclick="window.addRowMetadata()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-slate-700 transition">+ Fila</button>
        </div>
    </div>
    <table class="w-full text-xs border-collapse" id="tablaMetadataClinica">
        <thead class="bg-slate-100">
            <tr>
                <th class="p-2 border">ID Muestra (*)</th>
                <th class="p-2 border">Nombre Muestra</th>
                <th class="p-2 border">Nombre Paciente</th>
                <th class="p-2 border">Apellido Paciente</th>
                <th class="p-2 border">Fecha Nacimiento</th>
                <th class="p-2 border">Edad</th>
                <th class="p-2 border">Fecha Toma</th>
                <th class="p-2 border">Fecha Extracción ADN</th>
                <th class="p-2 border">Origen Muestra</th>
                <th class="p-2 border">Índice P/M (*)</th>
                <th class="p-2 border">Fecha Informe</th>
                <th class="p-2 border">Variante 1</th>
                <th class="p-2 border">Cigosidad 1</th>
                <th class="p-2 border">Clasificación 1</th>
                <th class="p-2 border">Variante 2</th>
                <th class="p-2 border">Cigosidad 2</th>
                <th class="p-2 border">Clasificación 2</th>
                <th class="p-2 border">Comentario</th>
                <th class="p-2 border">Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <div class="mt-6 flex justify-end">
        <button onclick="window.enviarMetadataBatch()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium transition">Guardar Metadata</button>
    </div>
</div>

<script>
    function init_metadata_clinica() {
        if (typeof populateSelect === "function") {
            populateSelect('/servicios/', 'select-id-servicio-metadata', 'id_servicio', null, window.formatServicioGlobal);
        }
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (tbody) tbody.innerHTML = "";
        
        if (window.lucide) lucide.createIcons();
    }

    window.cargarMuestrasPorServicio = async function(idServicio) {
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (!tbody) return;
        tbody.innerHTML = ""; 

        if (!idServicio) return;

        tbody.innerHTML = `<tr><td colspan="19" class="p-4 text-center text-slate-500 bg-slate-50 font-medium">Buscando muestras y registros clínicos existentes...</td></tr>`;

        try {
            const res = await fetch(`http://127.0.0.1:8000/servicios/${idServicio}`);
            if (res.ok) {
                const servicio = await res.json();
                tbody.innerHTML = ""; 
                
                if (servicio.muestras && servicio.muestras.length > 0) {
                    servicio.muestras.forEach(muestra => {
                        // Pasamos los datos de la muestra y desestructuramos su metadata clínica si ya existe
                        window.addRowMetadata({ 
                            id_muestra: muestra.id_muestra,
                            nombre_muestra: muestra.nombre_muestra,
                            ...(muestra.metadata_clinica || {})
                        });
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="19" class="p-4 text-center text-amber-600 bg-amber-50">Este servicio no tiene muestras cargadas en el laboratorio. Primero cargue las muestras.</td></tr>`;
                }
            } else {
                tbody.innerHTML = `<tr><td colspan="19" class="p-4 text-center text-red-500 bg-red-50">Error al recuperar estructura del servicio.</td></tr>`;
            }
        } catch (error) {
            console.error("Error al recuperar las muestras del servicio:", error);
            tbody.innerHTML = `<tr><td colspan="19" class="p-4 text-center text-red-500 bg-red-50">Error de conexión con la API.</td></tr>`;
        }
    };

    window.addRowMetadata = function(data = {}) {
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (!tbody) return;

        const idMuestraVal = data.id_muestra ? data.id_muestra : "";
        const nombreMuestraVal = data.nombre_muestra ? data.nombre_muestra : "";
        
        const readonlyAttr = data.id_muestra ? "readonly class='md-idm w-full p-1 border rounded bg-slate-100 font-bold text-center'" : "class='md-idm w-full p-1 border rounded'";
        const readonlyNombreMuestra = data.id_muestra ? "readonly class='md-nom-mue w-full p-1 border rounded bg-slate-50 text-gray-500 font-mono'" : "class='md-nom-mue w-full p-1 border rounded'";

        // Extracción de datos existentes para el rellenado (Edición)
        const nombre = data.nombre || "";
        const apellido = data.apellido || "";
        const fechaNac = data.fecha_nacimiento || "";
        const edad = data.edad !== undefined && data.edad !== null ? data.edad : "";
        const fechaToma = data.fecha_toma || "";
        const fechaExt = data.fecha_extraccion || "";
        const origen = data.origen_muestra || "";
        const indicePM = data.indice_padre_madre || "Caso Indice";
        const fechaInf = data.fecha_informe || "";
        const var1 = data.variante1 || "";
        const cig1 = data.cigosidad1 || "";
        const cla1 = data.clasificacion1 || "";
        const var2 = data.variante2 || "";
        const cig2 = data.cigosidad2 || "";
        const cla2 = data.clasificacion2 || "";
        const comentario = data.comentario_metadata || "";

        // Usamos insertAdjacentHTML para inyectar la fila limpia directamente en la raíz del tbody
        const filaHTML = `
            <tr class="hover:bg-slate-50 transition">
                <td class="p-1 border"><input type="number" value="${idMuestraVal}" ${readonlyAttr} required placeholder="Ej: 1"></td>
                <td class="p-1 border"><input type="text" value="${nombreMuestraVal}" ${readonlyNombreMuestra} placeholder="Código muestra"></td>
                
                <td class="p-1 border"><input type="text" class="md-nom w-full p-1 border rounded" value="${nombre}" placeholder="Nombre"></td>
                <td class="p-1 border"><input type="text" class="md-ape w-full p-1 border rounded" value="${apellido}" placeholder="Apellido"></td>
                <td class="p-1 border"><input type="date" class="md-fna w-full p-1 border rounded" value="${fechaNac}"></td>
                <td class="p-1 border"><input type="number" class="md-eda w-full p-1 border rounded" value="${edad}" placeholder="Edad"></td>
                <td class="p-1 border"><input type="date" class="md-fto w-full p-1 border rounded" value="${fechaToma}"></td>
                <td class="p-1 border"><input type="date" class="md-fex w-full p-1 border rounded" value="${fechaExt}"></td>
                <td class="p-1 border"><input type="text" class="md-ori w-full p-1 border rounded" value="${origen}" placeholder="Origen"></td>
                <td class="p-1 border">
                    <select class="md-pm w-full p-1 border rounded" required>
                        <option value="Caso Indice" ${indicePM === 'Caso Indice' ? 'selected' : ''}>Caso Indice</option>
                        <option value="Madre" ${indicePM === 'Madre' ? 'selected' : ''}>Madre</option>
                        <option value="Padre" ${indicePM === 'Padre' ? 'selected' : ''}>Padre</option>
                        <option value="Hermano/a" ${indicePM === 'Hermano/a' ? 'selected' : ''}>Hermano/a</option>
                        <option value="Otro" ${indicePM === 'Otro' ? 'selected' : ''}>Otro</option>
                    </select>
                </td>
                <td class="p-1 border"><input type="date" class="md-fin w-full p-1 border rounded" value="${fechaInf}"></td>
                <td class="p-1 border"><input type="text" class="md-var1 w-full p-1 border rounded" value="${var1}" placeholder="Variante 1"></td>
                <td class="p-1 border">
                    <select class="md-cig1 w-full p-1 border rounded">
                        <option value=""></option>
                        <option value="Homocigota" ${cig1 === 'Homocigota' ? 'selected' : ''}>Homocigota</option>
                        <option value="Heterocigota" ${cig1 === 'Heterocigota' ? 'selected' : ''}>Heterocigota</option>
                        <option value="Hemicigota" ${cig1 === 'Hemicigota' ? 'selected' : ''}>Hemicigota</option>
                    </select>
                </td>
                <td class="p-1 border">
                    <select class="md-cla1 w-full p-1 border rounded">
                        <option value=""></option>
                        <option value="Significado incierto" ${cla1 === 'Significado incierto' ? 'selected' : ''}>Significado incierto</option>
                        <option value="Benigna" ${cla1 === 'Benigna' ? 'selected' : ''}>Benigna</option>
                        <option value="Probablemente benigna" ${cla1 === 'Probablemente benigna' ? 'selected' : ''}>Probablemente benigna</option>
                        <option value="Probablemente patogénica" ${cla1 === 'Probablemente patogénica' ? 'selected' : ''}>Probablemente patogénica</option>
                        <option value="Patogénica" ${cla1 === 'Patogénica' ? 'selected' : ''}>Patogénica</option>
                        <option value="Otro" ${cla1 === 'Otro' ? 'selected' : ''}>Otro</option>
                    </select>
                </td>
                <td class="p-1 border"><input type="text" class="md-var2 w-full p-1 border rounded" value="${var2}" placeholder="Variante 2"></td>
                <td class="p-1 border">
                    <select class="md-cig2 w-full p-1 border rounded">
                        <option value=""></option>
                        <option value="Homocigota" ${cig2 === 'Homocigota' ? 'selected' : ''}>Homocigota</option>
                        <option value="Heterocigota" ${cig2 === 'Heterocigota' ? 'selected' : ''}>Heterocigota</option>
                        <option value="Hemicigota" ${cig2 === 'Hemicigota' ? 'selected' : ''}>Hemicigota</option>
                    </select>
                </td>
                <td class="p-1 border">
                    <select class="md-cla2 w-full p-1 border rounded">
                        <option value=""></option>
                        <option value="Significado incierto" ${cla2 === 'Significado incierto' ? 'selected' : ''}>Significado incierto</option>
                        <option value="Benigna" ${cla2 === 'Benigna' ? 'selected' : ''}>Benigna</option>
                        <option value="Probablemente benigna" ${cla2 === 'Probablemente benigna' ? 'selected' : ''}>Probablemente benigna</option>
                        <option value="Probablemente patogénica" ${cla2 === 'Probablemente patogénica' ? 'selected' : ''}>Probablemente patogénica</option>
                        <option value="Patogénica" ${cla2 === 'Patogénica' ? 'selected' : ''}>Patogénica</option>
                        <option value="Otro" ${cla2 === 'Otro' ? 'selected' : ''}>Otro</option>
                    </select>
                </td>
                <td class="p-1 border"><input type="text" class="md-com w-full p-1 border rounded" value="${comentario}" placeholder="Comentario"></td>
                <td class="p-1 border text-center">
                    <button onclick="this.closest('tr').remove()" class="text-red-500 hover:text-red-700">
                        <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
                    </button>
                </td>
            </tr>
        `;
        
        tbody.insertAdjacentHTML('beforeend', filaHTML);
        if (window.lucide) lucide.createIcons();
    };

    window.enviarMetadataBatch = async function() {
        const sid = document.getElementById('select-id-servicio-metadata').value;
        if (!sid) {
            alert("Por favor seleccione un ID de Servicio");
            return;
        }

        const filas = document.querySelectorAll("#tablaMetadataClinica tbody tr");
        if (filas.length === 0) {
            alert("No hay filas de metadatos clínicos para guardar.");
            return;
        }

        const payload = [];
        let valid = true;

        for (let f of filas) {
            // Saltamos filas de mensajes informativos (como el spinner de carga)
            if (f.cells.length === 1 && f.cells[0].getAttribute('colspan')) continue;

            const idMuestra = f.querySelector(".md-idm")?.value.trim();
            if (!idMuestra) {
                valid = false;
                break;
            }

            payload.push({
                id_muestra: parseInt(idMuestra, 10),
                nombre: f.querySelector(".md-nom").value.trim() || null,
                apellido: f.querySelector(".md-ape").value.trim() || null,
                fecha_nacimiento: f.querySelector(".md-fna").value || null,
                edad: f.querySelector(".md-eda").value ? parseInt(f.querySelector(".md-eda").value, 10) : null,
                fecha_toma: f.querySelector(".md-fto").value || null,
                fecha_extraccion: f.querySelector(".md-fex").value || null,
                origen_muestra: f.querySelector(".md-ori").value.trim() || null,
                indice_padre_madre: f.querySelector(".md-pm").value,
                fecha_informe: f.querySelector(".md-fin").value || null,
                variante1: f.querySelector(".md-var1").value.trim() || null,
                cigosidad1: f.querySelector(".md-cig1").value || null,
                clasificacion1: f.querySelector(".md-cla1").value || null,
                variante2: f.querySelector(".md-var2").value.trim() || null,
                cigosidad2: f.querySelector(".md-cig2").value || null,
                clasificacion2: f.querySelector(".md-cla2").value || null,
                comentario_metadata: f.querySelector(".md-com").value.trim() || null
            });
        }

        if (!valid) {
            alert("El ID de Muestra es obligatorio para cada fila clínica.");
            return;
        }

        try {
            // Mantenemos el POST apuntando a tu endpoint de Upsert masivo
            const res = await fetch('http://127.0.0.1:8000/metadata-clinica/batch', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Metadatos clínicos guardados y sincronizados con éxito.");
                window.cargarMuestrasPorServicio(sid); 
            } else {
                const err = await res.json();
                alert("Error de validación del backend: " + JSON.stringify(err.detail));
            }
        } catch (error) {
            console.error("Error de Red:", error);
            alert("Error de comunicación con el servidor de FastAPI.");
        }
    };
</script>
