<div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
    <div class="flex justify-between items-center mb-6 min-w-max">
        <h2 class="text-2xl font-bold text-blue-600 flex items-center gap-2"><i data-lucide="user-cog"></i> Registro de Metadata Clínica</h2>
        <div class="flex gap-4 items-center">
            <label class="text-sm font-medium">ID Servicio</label>
            <select id="select-id-servicio-metadata" name="id_servicio" required class="border rounded p-1 text-sm" onchange="window.cargarMuestrasPorServicio(this.value)"></select>                        
            <button onclick="window.addRowMetadata()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-slate-700 transition">+ Fila</button>
        </div>
    </div>
    <table class="w-full text-xs border-collapse" id="tablaMetadataClinica">
        <thead class="bg-slate-100">
            <tr>
                <th class="p-2 border">ID Muestra (*)</th>
                <th class="p-2 border">Nombre Muestra</th>
                <th class="p-2 border">Nombre Paciente</th>
                <th class="p-2 border">Apellido Paciente</th>
                <th class="p-2 border">Fecha Nacimiento</th>
                <th class="p-2 border">Edad</th>
                <th class="p-2 border">Fecha Toma</th>
                <th class="p-2 border">Fecha Extracción ADN</th>
                <th class="p-2 border">Origen Muestra</th>
                <th class="p-2 border">Índice P/M (*)</th>
                <th class="p-2 border">Fecha Informe</th>
                <th class="p-2 border">Variante 1</th>
                <th class="p-2 border">Cigosidad 1</th>
                <th class="p-2 border">Clasificación 1</th>
                <th class="p-2 border">Variante 2</th>
                <th class="p-2 border">Cigosidad 2</th>
                <th class="p-2 border">Clasificación 2</th>
                <th class="p-2 border">Comentario</th>
                <th class="p-2 border">Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <div class="mt-6 flex justify-end">
        <button onclick="window.enviarMetadataBatch()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium transition">Guardar Metadata</button>
    </div>
</div>

<script>
    function init_metadata_clinica() {
        if (typeof populateSelect === "function") {
            populateSelect('/servicios/', 'select-id-servicio-metadata', 'id_servicio', null, window.formatServicioGlobal);
        }
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (tbody) tbody.innerHTML = "";
        
        if (window.lucide) lucide.createIcons();
    }

    window.cargarMuestrasPorServicio = async function(idServicio) {
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (!tbody) return;
        tbody.innerHTML = ""; 

        if (!idServicio) return;

        try {
            const res = await fetch(`http://127.0.0.1:8000/servicios/${idServicio}`);
            if (res.ok) {
                const servicio = await res.json();
                
                if (servicio.muestras && servicio.muestras.length > 0) {
                    // Mapeamos enviando tanto ID como el Nombre de la Muestra registrado en laboratorio
                    servicio.muestras.forEach(muestra => {
                        window.addRowMetadata({ 
                            id_muestra: muestra.id_muestra,
                            nombre_muestra: muestra.nombre_muestra 
                        });
                    });
                } else {
                    window.addRowMetadata();
                }
            } else {
                window.addRowMetadata();
            }
        } catch (error) {
            console.error("Error al recuperar las muestras del servicio:", error);
            window.addRowMetadata();
        }
    };

    window.addRowMetadata = function(data = {}) {
        const tbody = document.querySelector("#tablaMetadataClinica tbody");
        if (!tbody) return;

        const tr = document.createElement("tr");
        
        const idMuestraVal = data.id_muestra ? data.id_muestra : "";
        const nombreMuestraVal = data.nombre_muestra ? data.nombre_muestra : "";
        
        const readonlyAttr = data.id_muestra ? "readonly class='md-idm w-full p-1 border rounded bg-slate-100 font-bold text-center'" : "class='md-idm w-full p-1 border rounded'";
        // La info de la muestra de laboratorio la dejamos readonly para no romper relaciones de integridad
        const readonlyNombreMuestra = data.id_muestra ? "readonly class='md-nom-mue w-full p-1 border rounded bg-slate-50 text-gray-500 font-mono'" : "class='md-nom-mue w-full p-1 border rounded'";

        tr.innerHTML = `
            <td class="p-1 border"><input type="number" value="${idMuestraVal}" ${readonlyAttr} required placeholder="Ej: 1"></td>
            <td class="p-1 border"><input type="text" value="${nombreMuestraVal}" ${readonlyNombreMuestra} placeholder="Código muestra"></td>
            
            <td class="p-1 border"><input type="text" class="md-nom w-full p-1 border rounded" placeholder="Nombre"></td>
            <td class="p-1 border"><input type="text" class="md-ape w-full p-1 border rounded" placeholder="Apellido"></td>
            <td class="p-1 border"><input type="date" class="md-fna w-full p-1 border rounded"></td>
            <td class="p-1 border"><input type="number" class="md-eda w-full p-1 border rounded" placeholder="Edad"></td>
            <td class="p-1 border"><input type="date" class="md-fto w-full p-1 border rounded"></td>
            <td class="p-1 border"><input type="date" class="md-fex w-full p-1 border rounded"></td>
            <td class="p-1 border"><input type="text" class="md-ori w-full p-1 border rounded" placeholder="Origen"></td>
            <td class="p-1 border">
                <select class="md-pm w-full p-1 border rounded" required>
                    <option value="Caso Indice">Caso Indice</option>
                    <option value="Madre">Madre</option>
                    <option value="Padre">Padre</option>
                    <option value="Hermano/a">Hermano/a</option>
                    <option value="Otro">Otro</option>
                </select>
            </td>
            <td class="p-1 border"><input type="date" class="md-fin w-full p-1 border rounded"></td>
            <td class="p-1 border"><input type="text" class="md-var1 w-full p-1 border rounded" placeholder="Variante 1"></td>
            <td class="p-1 border">
                <select class="md-cig1 w-full p-1 border rounded">
                    <option value=""></option>
                    <option value="Homocigota">Homocigota</option>
                    <option value="Heterocigota">Heterocigota</option>
                    <option value="Hemicigota">Hemicigota</option>
                </select>
            </td>
            <td class="p-1 border">
                <select class="md-cla1 w-full p-1 border rounded">
                    <option value=""></option>
                    <option value="Significado incierto">Significado incierto</option>
                    <option value="Benigna">Benigna</option>
                    <option value="Probablemente benigna">Probablemente benigna</option>
                    <option value="Probablemente patogénica">Probablemente patogénica</option>
                    <option value="Patogénica">Patogénica</option>
                    <option value="Otro">Otro</option>
                </select>
            </td>
            <td class="p-1 border"><input type="text" class="md-var2 w-full p-1 border rounded" placeholder="Variante 2"></td>
            <td class="p-1 border">
                <select class="md-cig2 w-full p-1 border rounded">
                    <option value=""></option>
                    <option value="Homocigota">Homocigota</option>
                    <option value="Heterocigota">Heterocigota</option>
                    <option value="Hemicigota">Hemicigota</option>
                </select>
            </td>
            <td class="p-1 border">
                <select class="md-cla2 w-full p-1 border rounded">
                    <option value=""></option>
                    <option value="Significado incierto">Significado incierto</option>
                    <option value="Benigna">Benigna</option>
                    <option value="Probablemente benigna">Probablemente benigna</option>
                    <option value="Probablemente patogénica">Probablemente patogénica</option>
                    <option value="Patogénica">Patogénica</option>
                    <option value="Otro">Otro</option>
                </select>
            </td>
            <td class="p-1 border"><input type="text" class="md-com w-full p-1 border rounded" placeholder="Comentario"></td>
            <td class="p-1 border text-center">
                <button onclick="this.closest('tr').remove()" class="text-red-500 hover:text-red-700">
                    <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
                </button>
            </td>
        `;
        tbody.appendChild(tr);
        if (window.lucide) lucide.createIcons();
    };

    window.enviarMetadataBatch = async function() {
        const sid = document.getElementById('select-id-servicio-metadata').value;
        if (!sid) {
            alert("Por favor seleccione un ID de Servicio");
            return;
        }

        const filas = document.querySelectorAll("#tablaMetadataClinica tbody tr");
        if (filas.length === 0) {
            alert("No hay filas de metadatos clínicos para guardar.");
            return;
        }

        const payload = [];
        let valid = true;

        filas.forEach(f => {
            const idMuestra = f.querySelector(".md-idm").value.trim();
            if (!idMuestra) {
                valid = false;
                return;
            }
            
            const nombre = f.querySelector(".md-nom").value.trim();
            const apellido = f.querySelector(".md-ape").value.trim();
            const fechaNacimiento = f.querySelector(".md-fna").value;
            const edad = f.querySelector(".md-eda").value;
            const fechaToma = f.querySelector(".md-fto").value;
            const fechaExtraccion = f.querySelector(".md-fex").value;
            const origenMuestra = f.querySelector(".md-ori").value.trim();
            const indicePadreMadre = f.querySelector(".md-pm").value;
            const fechaInforme = f.querySelector(".md-fin").value;
            const variante1 = f.querySelector(".md-var1").value.trim();
            const cigosidad1 = f.querySelector(".md-cig1").value;
            const clasificacion1 = f.querySelector(".md-cla1").value;
            const variante2 = f.querySelector(".md-var2").value.trim();
            const cigosidad2 = f.querySelector(".md-cig2").value;
            const clasificacion2 = f.querySelector(".md-cla2").value;
            const comentario = f.querySelector(".md-com").value.trim();

            payload.push({
                id_muestra: parseInt(idMuestra, 10),
                nombre: nombre || null,
                apellido: apellido || null,
                fecha_nacimiento: fechaNacimiento || null,
                edad: edad ? parseInt(edad, 10) : null,
                fecha_toma: fechaToma || null,
                fecha_extraccion: fechaExtraccion || null,
                origen_muestra: origenMuestra || null,
                indice_padre_madre: indicePadreMadre,
                fecha_informe: fechaInforme || null,
                variante1: variante1 || null,
                cigosidad1: cigosidad1 || null,
                clasificacion1: clasificacion1 || null,
                variante2: variante2 || null,
                cigosidad2: cigosidad2 || null,
                clasificacion2: clasificacion2 || null,
                comentario_metadata: comentario || null
            });
        });

        if (!valid) {
            alert("El ID de Muestra es obligatorio para cada fila clínica.");
            return;
        }

        try {
            const res = await fetch('http://127.0.0.1:8000/metadata-clinica/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Metadatos clínicos guardados con éxito.");
                document.querySelector("#tablaMetadataClinica tbody").innerHTML = "";
                window.cargarMuestrasPorServicio(sid);
            } else {
                const err = await res.json();
                alert("Error de validación del backend: " + JSON.stringify(err.detail));
            }
        } catch (error) {
            console.error("Error de Red:", error);
            alert("Error de comunicación con el servidor de FastAPI.");
        }
    };
</script>
